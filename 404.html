<script src="planarkit.js"></script>
<script src="scripts.js"></script>
<script>
(function() {
  var cvs = document.getElementById('landing-planar');
  if (!cvs || !window.PlanarKit) return;
  var PK = window.PlanarKit;
  PK.syncColors();
  PK.installThemeObs();

  var sc = PK.create(cvs);
  sc.keepAlive = true;

  var hoverField = null;
  function pos(e) {
    var r = cvs.getBoundingClientRect();
    var s = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
    return {x: s.clientX - r.left, y: s.clientY - r.top};
  }

  document.addEventListener('mousemove', function(e) {
    var p = pos(e);
    if (!hoverField) { hoverField = sc.addField(p.x, p.y, 'attract', 0.4, 0, true, 160, 0.3); }
    hoverField.x = p.x; hoverField.y = p.y;
    PK.wake(sc);
  });

  document.addEventListener('mousedown', function(e) {
    var p = pos(e);
    sc.addRipple(p.x, p.y, 1, 13, 10, 3);
    PK.wake(sc);
  });

  function resize() {
    sc.W = window.innerWidth; sc.H = window.innerHeight;
    cvs.width = Math.round(sc.W * sc.dpr); cvs.height = Math.round(sc.H * sc.dpr);
    sc.buildGrid(); sc.render(); PK.wake(sc);
  }
  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
